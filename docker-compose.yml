services:
  postgres:
    image: postgres:16-alpine
    container_name: pedwm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sueca
      POSTGRES_USER: sueca
      POSTGRES_PASSWORD: sueca123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sueca -d sueca"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pedwm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_ADDR: ":4000"
      DATABASE_URL: "postgres://sueca:sueca123@postgres:5432/sueca?sslmode=disable"
    ports:
      - "4000:4000"

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: pedwm_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pedwm.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
